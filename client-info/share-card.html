<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Spline+Sans+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1200px;height:630px;overflow:hidden;
    font-family:"Instrument Serif",serif;
    background:radial-gradient(120% 90% at 15% 0%,#2b2340 0%,#17141f 60%);
    color:#ede6da;display:flex;flex-direction:column;justify-content:space-between;padding:70px 80px}
  .top{display:flex;justify-content:space-between;align-items:center}
  .mono{font-family:"Spline Sans Mono",monospace;font-size:20px;letter-spacing:.2em;text-transform:uppercase;color:#c9a24b}
  h1{font-weight:400;font-size:150px;line-height:.9;letter-spacing:-.01em}
  h1 em{color:#c9a24b}
  .bottom{display:flex;justify-content:space-between;align-items:flex-end}
  .name{font-size:34px}
  .chip{border:1.5px solid rgba(237,230,218,.4);border-radius:999px;padding:12px 28px;font-family:"Spline Sans Mono",monospace;font-size:19px;letter-spacing:.08em;text-transform:uppercase;color:#c9a24b}
</style></head>
<body>
  <div class="top"><span class="mono">Side A</span><span class="mono">Musician · Coach</span></div>
  <h1>Find your <em>sound</em>.</h1>
  <div class="bottom"><span class="name">Caleb · Piano &amp; guitar lessons</span><span class="chip">Book on Instagram</span></div>
</body></html>
